<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password · LeaveSetu</title>
  <!-- Tailwind + Font Awesome (same as base) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* custom aqua/ink tokens to align with base.html */
    :root {
      --aqua: #00c6d4;
      --aqua-light: #4de8f4;
      --aqua-deep: #007a8a;
      --aqua-darker: #005f6e;
      --ink: #0b1221;
    }
    /* subtle background glow (like base) */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 50% at 10% 30%, rgba(0,198,212,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse 40% 40% at 90% 80%, rgba(0,198,212,0.08) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    /* ensure content is above glow */
    .relative { position: relative; z-index: 2; }
  </style>
</head>
<body class="bg-[#f0fbfc] flex items-center justify-center min-h-screen font-['Plus_Jakarta_Sans',sans-serif] relative">

  <!-- main card – now using ink & aqua theme -->
  <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md border border-[rgba(0,198,212,0.2)] relative z-10">
    
    <!-- subtle aqua accent line at top -->
    <div class="h-1.5 w-20 bg-gradient-to-r from-[#00c6d4] to-[#007a8a] rounded-full mx-auto mb-5"></div>
    
    <h2 class="text-3xl font-bold text-[#0b1221] mb-3 text-center tracking-tight">Reset password</h2>
    <p class="text-[#5a7d8c] mb-8 text-center text-base">Enter your new password below</p>

    <!-- message box (hidden by default, styled with aqua/ink) -->
    <div id="message" class="hidden mb-5 p-3 rounded-xl text-center font-medium text-sm border"></div>

    <form id="resetForm" class="space-y-5">
      {% csrf_token %}
      
      <!-- new password field with aqua focus -->
      <div class="relative">
        <span class="absolute left-4 top-3.5 text-[#a5cdd6]"><i class="fa-solid fa-lock"></i></span>
        <input type="password" id="password1" name="password1" required
               class="w-full pl-12 pr-4 py-3.5 border border-[rgba(0,198,212,0.27)] rounded-xl bg-[#f5fefe] 
                      focus:ring-2 focus:ring-[#00c6d4] focus:border-transparent focus:outline-none 
                      text-[#0d1117] placeholder:text-[#a5cdd6] transition"
               placeholder="New password">
      </div>
      
      <!-- confirm password field -->
      <div class="relative">
        <span class="absolute left-4 top-3.5 text-[#a5cdd6]"><i class="fa-solid fa-lock"></i></span>
        <input type="password" id="password2" name="password2" required
               class="w-full pl-12 pr-4 py-3.5 border border-[rgba(0,198,212,0.27)] rounded-xl bg-[#f5fefe] 
                      focus:ring-2 focus:ring-[#00c6d4] focus:border-transparent focus:outline-none 
                      text-[#0d1117] placeholder:text-[#a5cdd6] transition"
               placeholder="Confirm new password">
      </div>
      
      <!-- submit button with aqua gradient (matches base .btn-primary) -->
      <button type="submit" 
              class="w-full bg-gradient-to-r from-[#005f6e] to-[#00c6d4] text-white p-3.5 rounded-xl 
                     font-bold text-base shadow-lg hover:shadow-xl hover:-translate-y-0.5 
                     transition-all duration-200 flex items-center justify-center gap-2">
        <i class="fa-regular fa-rotate-right"></i> Reset password
      </button>
    </form>

    <!-- back to login link (aqua) -->
    <div class="mt-7 text-center">
      <a href="{% url 'login' %}" class="text-[#007a8a] hover:text-[#00c6d4] font-semibold text-sm transition inline-flex items-center gap-1">
        <i class="fa-solid fa-arrow-left text-xs"></i> Back to login
      </a>
    </div>

    <!-- small footer note -->
    <p class="text-center text-[#a5cdd6] text-xs mt-8">LeaveSetu · secure reset</p>
  </div>

  <script>
    document.getElementById('resetForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const password1 = document.getElementById('password1').value;
      const password2 = document.getElementById('password2').value;
      const msgBox    = document.getElementById('message');
      const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

      // simple frontend validation
      if (password1 !== password2) {
        msgBox.classList.remove('hidden', 'bg-green-100', 'text-green-700');
        msgBox.classList.add('bg-red-100', 'text-red-700', 'border-red-200');
        msgBox.textContent = 'Passwords do not match.';
        return;
      }

      if (password1.length < 8) {
        msgBox.classList.remove('hidden', 'bg-green-100', 'text-green-700');
        msgBox.classList.add('bg-red-100', 'text-red-700', 'border-red-200');
        msgBox.textContent = 'Password must be at least 8 characters.';
        return;
      }

      const response = await fetch(window.location.href, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken,
        },
        body: JSON.stringify({ password1, password2 })
      });

      const data = await response.json();
      msgBox.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700', 'border-green-200', 'border-red-200');

      if (response.ok) {
        msgBox.classList.add('bg-green-100', 'text-green-700', 'border-green-200');
        msgBox.textContent = data.message || 'Password reset successful!';
        setTimeout(() => window.location.href = '/login/', 2000);
      } else {
        msgBox.classList.add('bg-red-100', 'text-red-700', 'border-red-200');
        msgBox.textContent = data.error || 'Something went wrong.';
      }
    });
  </script>

</body>
</html>
