<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeaveSetu - LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #6C63FF, #FF6584);
            color: #fff;
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-shadow: 1px 1px 6px rgba(0,0,0,0.3);
        }
        .btn-primary {
            background: #fff;
            color: #6C63FF;
            font-weight: 600;
            padding: 1rem 2rem;
            border-radius: 50px;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background: #6C63FF;
            color: #fff;
        }
        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to LeaveSetu LMS</h1>
        <p>Manage leaves, track progress, and streamline HR operations.</p>
        <a href="{% url 'login' %}" class="btn btn-primary btn-lg">Get Started</a>
    </div>
    <footer>&copy; 2026 LeaveSetu LMS. All rights reserved.</footer>
</body>
</html>
