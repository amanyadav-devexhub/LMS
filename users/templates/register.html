<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register User - LeaveSetu LMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-xl rounded-2xl p-10 w-full max-w-lg">
    <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Register New User</h2>

    <form method="POST" class="space-y-5">
      {% csrf_token %}
      <div>
        <label class="block text-gray-700 font-semibold mb-1">Email</label>
        <input type="email" name="email" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none" placeholder="user@example.com">
      </div>
      <div>
        <label class="block text-gray-700 font-semibold mb-1">Role</label>
        <select name="role" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none">
          <option value="">Select Role</option>
          <option value="HR">HR</option>
          <option value="TL">Team Lead</option>
          <option value="Employee">Employee</option>
        </select>
      </div>
      <div class="flex items-center space-x-2">
        <input type="checkbox" name="is_senior" id="is_senior" class="h-5 w-5">
        <label for="is_senior" class="text-gray-700 font-medium">Is Senior?</label>
      </div>

      <button type="submit" class="w-full bg-purple-500 text-white p-3 rounded-xl font-semibold hover:bg-purple-600 transition">Create User</button>
    </form>
  </div>

</body>
</html>
