<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password · LeaveSetu</title>
  <!-- Tailwind + Font Awesome (same as base) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* custom aqua/ink tokens to align with base.html */
    :root {
      --aqua: #00c6d4;
      --aqua-deep: #007a8a;
      --aqua-darker: #005f6e;
      --ink: #0b1221;
    }
    /* subtle background glow (like base) */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 50% at 10% 30%, rgba(0,198,212,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse 40% 40% at 90% 80%, rgba(0,198,212,0.08) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    /* ensure content is above glow */
    .relative { position: relative; z-index: 2; }
  </style>
</head>
<body class="bg-[#f0fbfc] flex items-center justify-center min-h-screen font-['Plus_Jakarta_Sans',sans-serif] relative">

  <!-- main card – now using ink & aqua theme -->
  <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md border border-[rgba(0,198,212,0.2)] relative z-10">
    
    <!-- subtle aqua accent line at top -->
    <div class="h-1.5 w-20 bg-gradient-to-r from-[#00c6d4] to-[#007a8a] rounded-full mx-auto mb-5"></div>
    
    <h2 class="text-3xl font-bold text-[#0b1221] mb-3 text-center tracking-tight">Forgot password?</h2>
    <p class="text-[#5a7d8c] mb-8 text-center text-base">Enter your email to receive a password reset link</p>

    <form method="POST" class="space-y-5">
      {% csrf_token %}
      
      <!-- email field with aqua focus ring -->
      <div class="relative">
        <span class="absolute left-4 top-3.5 text-[#a5cdd6]"><i class="fa-regular fa-envelope"></i></span>
        <input type="email" name="email" required
               class="w-full pl-12 pr-4 py-3.5 border border-[rgba(0,198,212,0.27)] rounded-xl bg-[#f5fefe] 
                      focus:ring-2 focus:ring-[#00c6d4] focus:border-transparent focus:outline-none 
                      text-[#0d1117] placeholder:text-[#a5cdd6] transition"
               placeholder="you@example.com">
      </div>
      
      <!-- submit button with aqua gradient (matches base .btn-primary) -->
      <button type="submit" 
              class="w-full bg-gradient-to-r from-[#005f6e] to-[#00c6d4] text-white p-3.5 rounded-xl 
                     font-bold text-base shadow-lg hover:shadow-xl hover:-translate-y-0.5 
                     transition-all duration-200 flex items-center justify-center gap-2">
        <i class="fa-regular fa-paper-plane"></i> Send reset link
      </button>
    </form>

    <!-- back to login link (aqua) -->
    <div class="mt-7 text-center">
      <a href="{% url 'login' %}" class="text-[#007a8a] hover:text-[#00c6d4] font-semibold text-sm transition inline-flex items-center gap-1">
        <i class="fa-solid fa-arrow-left text-xs"></i> Back to login
      </a>
    </div>

    <!-- small footer note (optional) -->
    <p class="text-center text-[#a5cdd6] text-xs mt-8">LeaveSetu · leave management</p>
  </div>

</body>
</html>
