<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - LeaveSetu LMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center min-h-screen">

  <div class="bg-white rounded-2xl shadow-2xl p-10 w-full max-w-md">
    <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Forgot Password?</h2>
    <p class="text-gray-500 mb-6 text-center">Enter your email to receive a password reset link</p>

    <form method="POST" class="space-y-4">
      {% csrf_token %}
      <input type="email" name="email" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-pink-400 focus:outline-none" placeholder="you@example.com">
      <button type="submit" class="w-full bg-pink-500 text-white p-3 rounded-xl font-semibold hover:bg-pink-600 transition">Send Reset Link</button>
    </form>
  </div>

</body>
</html>
