<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password · LeaveSetu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --aqua: #00c6d4;
      --aqua-deep: #007a8a;
      --aqua-darker: #005f6e;
      --ink: #0b1221;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 10% 30%, rgba(0,198,212,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 90% 80%, rgba(0,198,212,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body class="bg-[#f0fbfc] flex items-center justify-center min-h-screen font-['Plus_Jakarta_Sans',sans-serif]">

  <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md border border-[rgba(0,198,212,0.2)] relative z-10">

    <!-- Aqua accent line -->
    <div class="h-1.5 w-20 bg-gradient-to-r from-[#00c6d4] to-[#007a8a] rounded-full mx-auto mb-5"></div>

    <h2 class="text-3xl font-bold text-[#0b1221] mb-3 text-center tracking-tight">Forgot password?</h2>
    <p class="text-[#5a7d8c] mb-8 text-center text-base">Enter your email to receive a password reset link</p>

    <!-- ✅ Alert banner — injected by JS, hidden by default -->
    <div id="alert-box" class="hidden"></div>

    <form id="forgot-form" method="POST" class="space-y-5">
      {% csrf_token %}

      <div class="relative">
        <span class="absolute left-4 top-3.5 text-[#a5cdd6]">
          <i class="fa-regular fa-envelope"></i>
        </span>
        <input
          type="email"
          name="email"
          id="email-input"
          required
          class="w-full pl-12 pr-4 py-3.5 border border-[rgba(0,198,212,0.27)] rounded-xl bg-[#f5fefe]
                 focus:ring-2 focus:ring-[#00c6d4] focus:border-transparent focus:outline-none
                 text-[#0d1117] placeholder:text-[#a5cdd6] transition"
          placeholder="you@example.com"
        >
      </div>

      <button
        type="submit"
        id="submit-btn"
        class="w-full bg-gradient-to-r from-[#005f6e] to-[#00c6d4] text-white p-3.5 rounded-xl
               font-bold text-base shadow-lg hover:shadow-xl hover:-translate-y-0.5
               transition-all duration-200 flex items-center justify-center gap-2
               disabled:opacity-60 disabled:cursor-not-allowed disabled:translate-y-0"
      >
        <i class="fa-regular fa-paper-plane" id="btn-icon"></i>
        <span id="btn-text">Send reset link</span>
      </button>
    </form>

    <!-- Back to login -->
    <div class="mt-7 text-center">
      <a href="{% url 'login' %}" class="text-[#007a8a] hover:text-[#00c6d4] font-semibold text-sm transition inline-flex items-center gap-1">
        <i class="fa-solid fa-arrow-left text-xs"></i> Back to login
      </a>
    </div>

    <p class="text-center text-[#a5cdd6] text-xs mt-8">LeaveSetu · leave management</p>
  </div>

  <!-- ✅ JS: intercept submit → fetch API → show inline banner, no broken JSON page -->
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async function (e) {
      e.preventDefault(); // ← prevents normal form POST that causes broken JSON page

      const btn     = document.getElementById('submit-btn');
      const btnText = document.getElementById('btn-text');
      const btnIcon = document.getElementById('btn-icon');
      const email   = document.getElementById('email-input').value.trim();
      const csrf    = document.querySelector('[name=csrfmiddlewaretoken]').value;

      // ── Loading state ──────────────────────────────────────────
      btn.disabled       = true;
      btnIcon.className  = 'fa-solid fa-spinner fa-spin';
      btnText.textContent = 'Sending…';
      hideAlert();

      try {
        const res  = await fetch(window.location.pathname, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrf,
          },
          body: JSON.stringify({ email }),
        });

        const data = await res.json();

        if (res.ok && data.success) {
          showAlert(data.success, 'success');
          document.getElementById('email-input').value = ''; // clear field on success
        } else {
          showAlert(data.error || 'Something went wrong.', 'error');
        }

      } catch (err) {
        showAlert('Network error. Please try again.', 'error');
      } finally {
        // ── Restore button ─────────────────────────────────────
        btn.disabled        = false;
        btnIcon.className   = 'fa-regular fa-paper-plane';
        btnText.textContent = 'Send reset link';
      }
    });

    // ── Helper: render styled alert banner ─────────────────────
    function showAlert(message, type) {
      const box = document.getElementById('alert-box');

      const styles = type === 'success'
        ? 'bg-[#e6fafa] border border-[#00c6d4] text-[#005f6e]'
        : 'bg-red-50 border border-red-300 text-red-700';

      const icon = type === 'success'
        ? '<i class="fa-solid fa-circle-check text-[#00c6d4]"></i>'
        : '<i class="fa-solid fa-circle-exclamation text-red-500"></i>';

      box.className = `flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium mb-5 ${styles}`;
      box.innerHTML = `${icon} ${message}`;
      box.classList.remove('hidden');
    }

    function hideAlert() {
      const box = document.getElementById('alert-box');
      box.classList.add('hidden');
      box.innerHTML = '';
    }
  </script>

</body>
</html>
