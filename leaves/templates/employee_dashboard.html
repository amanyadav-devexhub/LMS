{% extends "base.html" %}
{% block title %}Employee Dashboard — LeaveSetu{% endblock %}
{% block page_title %}Leave History{% endblock %}
{% block nav_emp %}active{% endblock %}

{% block content %}
<style>
/* Hero Section - Simplified */
.dashboard-hero { 
    background: linear-gradient(135deg, var(--aqua-darker,#005f6e) 0%, var(--aqua-deep) 30%, var(--aqua) 65%, var(--aqua-light) 100%);
    border-radius: var(--radius);
    margin-bottom: 24px;
    padding: 24px 30px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
    position: relative;
}
.dashboard-hero::before {
    content: '';
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    top: -100px;
    right: -80px;
}
.dashboard-hero::after {
    content: '';
    position: absolute;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    bottom: -80px;
    left: -60px;
}
.hero-content {
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 1;
}
.hero-avatar {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg, #fff, rgba(255,255,255,0.8));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 800;
    color: var(--aqua-deep);
    border: 3px solid rgba(255,255,255,0.5);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}
.hero-info h2 {
    font-size: 24px;
    font-weight: 800;
    color: white;
    margin: 0 0 6px 0;
}
.hero-info p {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    margin: 0 0 8px 0;
    display: flex;
    align-items: center;
    gap: 6px;
}
.hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 600;
    color: white;
}
.apply-btn-hero {
    background: white;
    color: var(--aqua-deep);
    padding: 10px 24px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    transition: all 0.22s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    position: relative;
    z-index: 1;
}
.apply-btn-hero:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    background: white;
    color: var(--aqua-deep);
}

/* Leave Breakdown Section */
.leave-breakdown-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 24px;
    box-shadow: var(--shadow-xs);
}
.lbs-header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, rgba(0,198,212,0.04), transparent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
}
.lbs-title {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
}
.lbs-title-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--aqua-deep), var(--aqua));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #fff;
    box-shadow: 0 4px 14px rgba(0,198,212,0.38);
}
.lbs-year-badge {
    font-size: 11px;
    font-weight: 700;
    background: var(--aqua-glass);
    border: 1px solid var(--border-mid);
    color: var(--aqua-deep);
    padding: 3px 12px;
    border-radius: 20px;
}
.lbs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    padding: 20px 24px;
}
.lbs-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    transition: all 0.22s ease;
}
.lbs-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow);
    border-color: var(--border-mid);
}
.lbs-card-accent {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
}
.lbs-card-name {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
    margin-top: 6px;
}
.lbs-card-remaining {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1;
    color: var(--text);
    margin-bottom: 2px;
}
.lbs-card-of {
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 10px;
}
.lbs-card-bar-bg {
    height: 5px;
    background: var(--border);
    border-radius: 5px;
    overflow: hidden;
    margin-bottom: 10px;
}
.lbs-card-bar-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.5s;
}
.lbs-card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.lbs-paid-tag {
    font-size: 9.5px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
}
.lbs-paid-tag.paid {
    background: rgba(5,201,138,0.09);
    color: #047a52;
    border: 1px solid rgba(5,201,138,0.22);
}
.lbs-paid-tag.unpaid {
    background: rgba(240,64,88,0.09);
    color: #b01530;
    border: 1px solid rgba(240,64,88,0.22);
}
.lbs-used-text {
    font-size: 10px;
    color: var(--text-faint);
    font-weight: 600;
}

/* Section Card */
.section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-xs);
    margin-bottom: 24px;
}
.section-card-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, rgba(0,198,212,0.04), transparent);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.section-card-title {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
}
.section-title-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--aqua-deep), var(--aqua));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #fff;
    box-shadow: 0 4px 14px rgba(0,198,212,0.38);
    flex-shrink: 0;
}
.section-count {
    font-size: 12px;
    font-weight: 700;
    padding: 4px 14px;
    background: var(--aqua-glass);
    border: 1px solid var(--border);
    border-radius: 30px;
    color: var(--aqua-deep);
}

/* Table */
.table-wrapper {
    overflow-x: auto;
    padding: 0 4px 4px;
}
.leaves-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 700px;
}
.leaves-table th {
    text-align: left;
    padding: 14px 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--aqua-deep);
    background: linear-gradient(90deg, rgba(0,198,212,0.04), rgba(0,198,212,0.01));
    border-bottom: 1px solid var(--border-mid);
}
.leaves-table td {
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text-mid);
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    cursor: pointer;
    transition: background 0.2s;
}
.leaves-table tr:last-child td {
    border-bottom: none;
}
.leaves-table tbody tr:hover {
    background: rgba(0,198,212,0.08);
}
.badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 11px;
    font-weight: 600;
}
.badge-casual {
    background: rgba(0,198,212,0.08);
    color: var(--aqua-deep);
    border: 1px solid rgba(0,198,212,0.2);
}
.badge-sick {
    background: rgba(5,201,138,0.08);
    color: #047a52;
    border: 1px solid rgba(5,201,138,0.27);
}
.status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 11px;
    font-weight: 700;
}
.status-approved {
    background: rgba(5,201,138,0.08);
    color: #047a52;
    border: 1px solid rgba(5,201,138,0.27);
}
.status-rejected {
    background: rgba(240,64,88,0.08);
    color: #b01530;
    border: 1px solid rgba(240,64,88,0.27);
}
.status-pending {
    background: rgba(245,166,35,0.08);
    color: #905700;
    border: 1px solid rgba(245,166,35,0.27);
}
.status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
}
.status-dot.approved {
    background: var(--success, #05c98a);
}
.status-dot.rejected {
    background: var(--danger, #f04058);
}
.status-dot.pending {
    background: var(--warning, #f5a623);
    animation: blink 2s infinite;
}
@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}
.reason-cell {
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-muted);
}
.date-cell {
    color: var(--text-muted);
    font-weight: 500;
    font-size: 12px;
}
.empty-state {
    text-align: center;
    padding: 60px 24px;
}
.empty-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 16px;
    background: var(--aqua-glass);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: var(--aqua);
}
.empty-state h4 {
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
}
.empty-state p {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 20px;
}
.btn-primary {
    background: linear-gradient(135deg, var(--aqua-deep), var(--aqua));
    color: white;
    padding: 8px 20px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 600;
    font-size: 13px;
    display: inline-block;
    transition: all 0.2s;
}
.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0,198,212,0.4);
}

/* Pagination */
.pagination-wrap {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
    background: linear-gradient(90deg, rgba(0,198,212,0.02), transparent);
}
.pagination-info {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
}
.pagination-btns {
    display: flex;
    align-items: center;
    gap: 6px;
}
.pg-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    padding: 0 10px;
    font-family: inherit;
}
.pg-btn:hover:not(.disabled):not(.active) {
    border-color: var(--aqua);
    color: var(--aqua-deep);
    background: var(--aqua-glass);
}
.pg-btn.active {
    background: linear-gradient(135deg, var(--aqua-deep), var(--aqua));
    color: white;
    border-color: transparent;
    box-shadow: 0 3px 10px rgba(0,198,212,0.35);
}
.pg-btn.disabled {
    opacity: 0.4;
    pointer-events: none;
}

/* Quick Actions Grid */
.quick-actions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-bottom: 24px;
}
@media (max-width: 640px) {
    .quick-actions {
        grid-template-columns: 1fr;
    }
}
.action-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: all 0.24s;
}
.action-card:hover {
    transform: translateY(-2px);
    border-color: var(--border-mid);
    box-shadow: var(--shadow);
}
.action-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
}
.action-header i {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--aqua-glass);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--aqua-deep);
}
.action-header h4 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin: 0;
}
.action-item {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
}
.action-item:last-child {
    border-bottom: none;
}
.action-label {
    color: var(--text-muted);
}
.action-value {
    color: var(--text);
    font-weight: 600;
}
.action-link {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--aqua-glass);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--aqua-deep);
    font-weight: 600;
    font-size: 13px;
    text-decoration: none;
    transition: all 0.2s;
    margin-top: 12px;
}
.action-link:hover {
    background: linear-gradient(135deg, var(--aqua-deep), var(--aqua));
    color: white;
    border-color: transparent;
    transform: translateX(4px);
}

.animate-in {
    animation: fadeUp 0.4s ease both;
}
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(14px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
.delay-1 {
    animation-delay: 0.06s;
}
.delay-2 {
    animation-delay: 0.12s;
}
.delay-3 {
    animation-delay: 0.18s;
}

.clickable-row {
    cursor: pointer;
    transition: background 0.2s;
}
.clickable-row:hover {
    background: rgba(0,198,212,0.05) !important;
}

/* Loading state */
.skeleton {
    background: linear-gradient(90deg, var(--surface2) 0%, var(--border) 50%, var(--surface2) 100%);
    background-size: 200% 100%;
    animation: shimmer 2s infinite;
}
@keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}
</style>

<!-- Content Container -->
<div id="content-container">
    <div id="panel-overview">
        <!-- Hero Section -->
        <div id="hero-section" class="dashboard-hero animate-in"></div>

        <!-- Leave Balance Section -->
        <div id="leave-balance-section" class="leave-breakdown-section animate-in delay-1"></div>

        <!-- Quick Actions -->
        <div id="quick-actions-section" class="quick-actions animate-in delay-2"></div>
    </div>

    <div id="panel-history" style="display: none;">
        <!-- Leave History Section -->
        <div id="leave-history-section" class="section-card animate-in"></div>
    </div>
</div>

<style>
.employee-panel { display: block; }
.employee-panel.show { display: block; }
</style>

<script>
// Dashboard Data Store
const dashboardState = {
    data: null,
    currentPage: 1,
    perPage: 10,
};
let employeeAutoRefreshTimer = null;

// Fetch dashboard data from API
async function loadDashboard() {
    try {
        const response = await fetch("{% url 'api_employee_dashboard' %}", {
            headers: {
                'Accept': 'application/json',
            },
            credentials: 'same-origin',
        });

        if (!response.ok) throw new Error(`API error: ${response.status}`);
        
        const rawData = await response.json();
        console.log('Raw API response:', rawData);
        
        // Transform API structure to match template expectations
        dashboardState.data = {
            ...rawData,
            // Extract leaves.results array and flatten pagination info
            leaves: rawData.leaves?.results || [],
            total_pages: rawData.leaves?.num_pages || 1,
            current_page: rawData.leaves?.page || 1,
            all_leaves_count: rawData.leaves?.total_count || rawData.all_leaves_count || 0,
        };
        
        // Transform leave items to map API fields to template fields
        dashboardState.data.leaves = dashboardState.data.leaves.map(leave => ({
            id: leave.id,
            leave_type_name: leave.leave_type, // "Casual" → leave_type_name
            leave_type_code: leave.leave_type.substring(0, 1).toUpperCase(), // Generate code first letter
            start_date: leave.start_date,
            end_date: leave.end_date,
            days: leave.total_days, // total_days → days
            reason: leave.reason,
            final_status: leave.final_status,
        }));
        
        console.log('Transformed data:', dashboardState.data);
        renderDashboard();
    } catch (error) {
        console.error('Access Denied By Admin:', error);
        document.getElementById('content-container').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <h4>Access Denied By Admin</h4>
                <p>${error.message}</p>
                <button class="btn-primary" onclick="location.reload()">Retry</button>
            </div>
        `;
    }
}

// Render hero section
function renderHero() {
    const { data } = dashboardState;
    const user = data.user;
    const profile = data.profile || {};
    const designation = data.designation || 'Employee';
    
    const initials = `${user.first_name?.[0] || ''}${user.last_name?.[0] || ''}`.toUpperCase();
    
    const hero = document.getElementById('hero-section');
    hero.innerHTML = `
        <div class="hero-content">
            <div class="hero-avatar">${initials}</div>
            <div class="hero-info">
                <h2>Welcome back, ${user.first_name || 'Employee'}</h2>
                <p><i class="fa-regular fa-envelope"></i> ${user.email}</p>
                <div class="hero-badge">
                    <i class="fa-solid fa-briefcase"></i> 
                    ${designation}
                </div>
            </div>
        </div>
        <a href="{% url 'apply_leave' %}" class="apply-btn-hero">
            <i class="fa-regular fa-calendar-plus"></i>
            Apply for Leave
            <i class="fa-regular fa-arrow-right"></i>
        </a>
    `;
}

// Render leave balance cards
function renderLeaveBalance() {
    const { data } = dashboardState;
    const { active_leave_types, leave_summary } = data;
    const breakdown = leave_summary?.breakdown || [];
    
    const year = new Date().getFullYear();
    let html = `
        <div class="lbs-header">
            <div class="lbs-title">
                <div class="lbs-title-icon"><i class="fa-solid fa-wallet"></i></div>
                My Leave Balance
            </div>
            <span class="lbs-year-badge"><i class="fa-regular fa-calendar"></i> ${year}</span>
        </div>
    `;

    if (breakdown && breakdown.length > 0) {
        html += '<div class="lbs-grid">';
        
        for (const b of breakdown) {
            const usedPercent = b.allocated ? (b.used / b.allocated * 100) : 0;
            
            html += `
                <div class="lbs-card">
                    <div class="lbs-card-accent" style="background:${b.color};"></div>
                    <div class="lbs-card-name">${b.name}</div>
                    <div class="lbs-card-remaining">${b.remaining.toFixed(1)}</div>
                    <div class="lbs-card-of">of ${b.allocated.toFixed(0)} days allocated</div>
                    <div class="lbs-card-bar-bg">
                        <div class="lbs-card-bar-fill" style="width:${usedPercent}%;background:${b.color};"></div>
                    </div>
                    <div class="lbs-card-footer">
                        <span class="lbs-paid-tag ${b.is_paid ? 'paid' : 'unpaid'}">
                            ${b.is_paid ? 'Paid' : 'Unpaid'}
                        </span>
                        <span class="lbs-used-text">${b.used.toFixed(1)} used</span>
                    </div>
                </div>
            `;
        }
        
        html += '</div>';
        
        // Total row
        html += `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-top:1px solid var(--border);background:linear-gradient(90deg,rgba(0,198,212,0.03),transparent);flex-wrap:wrap;gap:8px;">
                <div style="font-size:12px;color:var(--text-muted);font-weight:600;">
                    <i class="fa-solid fa-sigma" style="color:var(--aqua-deep);margin-right:6px;"></i>
                    Total Available Balance
                </div>
                <div style="font-size:24px;font-weight:800;color:var(--aqua-deep);">
                    ${data.available_balance.toFixed(1)} days
                </div>
            </div>
        `;
    } else {
        html += `
            <div style="padding:40px;text-align:center;color:var(--text-muted);">
                <i class="fa-solid fa-chart-simple" style="font-size:48px;margin-bottom:12px;opacity:0.5;"></i>
                <p>No leave types configured yet.</p>
            </div>
        `;
    }
    
    document.getElementById('leave-balance-section').innerHTML = html;
}

// Render quick actions
function renderQuickActions() {
    const { data } = dashboardState;
    const profile = data.profile || {};

// Helper function to escape HTML
function escapeHtml(text) {
    if (!text) return text;
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Function to view leave details - Updated with correct URL pattern
function viewLeaveDetails(leaveId) {
    // Navigate to leave detail page using the correct URL pattern
    window.location.href = `/leave-detail/${leaveId}/`;
}

// Render leave history table with clickable rows
function renderLeaveHistory() {
    const { data, currentPage } = dashboardState;
    const { leaves, total_pages } = data;
    
    if (!leaves || leaves.length === 0) {
        document.getElementById('leave-history-section').innerHTML = `
            <div class="section-card-header">
                <div class="section-card-title">
                    <div class="section-title-icon"><i class="fa-regular fa-clock-rotate-left"></i></div>
                    Detailed Leave History
                </div>
                <span class="section-count">0 Records</span>
            </div>
            <div class="empty-state">
                <div class="empty-icon"><i class="fa-solid fa-calendar"></i></div>
                <h4>No Leave Records</h4>
                <p>You haven't applied for any leave yet.</p>
                <a href="{% url 'apply_leave' %}" class="btn-primary">
                    <i class="fa-regular fa-calendar-plus"></i> Apply for Leave
                </a>
            </div>
        `;
        return;
    }
    
    let html = `
        <div class="section-card-header">
            <div class="section-card-title">
                <div class="section-title-icon"><i class="fa-regular fa-clock-rotate-left"></i></div>
                Detailed Leave History
            </div>
            <span class="section-count">${data.all_leaves_count} Records</span>
        </div>
        <div class="table-wrapper">
            <table class="leaves-table">
                <thead>
                    <tr>
                        <th>Leave Type</th>
                        <th>From — To</th>
                        <th>Days</th>
                        <th>Reason</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
    `;
    
    for (const leave of leaves) {
        const statusClass = `status-${leave.final_status?.toLowerCase() || 'pending'}`;
        const badgeClass = `badge-${leave.leave_type_code?.toLowerCase() || 'casual'}`;
        
        html += `
            <tr class="clickable-row" data-leave-id="${leave.id}" onclick="viewLeaveDetails(${leave.id})">
                <td><span class="badge ${badgeClass}">${escapeHtml(leave.leave_type_name) || 'N/A'}</span></td>
                <td class="date-cell">${formatDate(leave.start_date)} — ${formatDate(leave.end_date)}</td>
                <td><strong>${leave.days || 0}</strong></td>
                <td class="reason-cell">${escapeHtml(leave.reason) || '—'}</td>
                <td>
                    <span class="status ${statusClass}">
                        <span class="status-dot ${leave.final_status?.toLowerCase() || 'pending'}"></span>
                        ${leave.final_status || 'PENDING'}
                    </span>
                </td>
            </tr>
        `;
    }
    
    html += `
                </tbody>
            </table>
        </div>
    `;
    
    // Pagination
    if (total_pages > 1) {
        html += `
            <div class="pagination-wrap">
                <div class="pagination-info">
                    Page ${currentPage} of ${total_pages}
                </div>
                <div class="pagination-btns">
        `;
        
        // Previous button
        if (currentPage > 1) {
            html += `<button class="pg-btn" onclick="goToPage(${currentPage - 1})"><i class="fa-regular fa-chevron-left"></i></button>`;
        } else {
            html += `<button class="pg-btn disabled"><i class="fa-regular fa-chevron-left"></i></button>`;
        }
        
        // Page numbers
        for (let i = 1; i <= total_pages; i++) {
            const isActive = i === currentPage ? 'active' : '';
            html += `<button class="pg-btn ${isActive}" onclick="goToPage(${i})">${i}</button>`;
        }
        
        // Next button
        if (currentPage < total_pages) {
            html += `<button class="pg-btn" onclick="goToPage(${currentPage + 1})"><i class="fa-regular fa-chevron-right"></i></button>`;
        } else {
            html += `<button class="pg-btn disabled"><i class="fa-regular fa-chevron-right"></i></button>`;
        }
        
        html += `
                </div>
            </div>
        `;
    }
    
    document.getElementById('leave-history-section').innerHTML = html;
}

// Load specific page for pagination
async function loadDashboardPage(page) {
    try {
        const response = await fetch(`{% url 'api_employee_dashboard' %}?page=${page}`, {
            headers: {
                'Accept': 'application/json',
            },
            credentials: 'same-origin',
        });

        if (!response.ok) throw new Error(`API error: ${response.status}`);
        
        const rawData = await response.json();
        
        dashboardState.data = {
            ...rawData,
            leaves: rawData.leaves?.results || [],
            total_pages: rawData.leaves?.num_pages || 1,
            current_page: page,
            all_leaves_count: rawData.leaves?.total_count || rawData.all_leaves_count || 0,
        };
        
        dashboardState.data.leaves = dashboardState.data.leaves.map(leave => ({
            id: leave.id,
            leave_type_name: leave.leave_type,
            leave_type_code: leave.leave_type.substring(0, 1).toUpperCase(),
            start_date: leave.start_date,
            end_date: leave.end_date,
            days: leave.total_days,
            reason: leave.reason,
            final_status: leave.final_status,
        }));
        
        // Only re-render the history section
        renderLeaveHistory();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (error) {
        console.error('Failed to load page:', error);
    }
}

// Render all sections
function renderDashboard() {
    renderHero();
    renderLeaveBalance();
    renderQuickActions();
    renderLeaveHistory();
}

// Helper: Format date
function formatDate(dateStr) {
    try {
        if (!dateStr) return '—';
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return '—';
        
        // Use numeric values that are guaranteed valid
        const day = date.getDate();
        const month = date.toLocaleString('en-US', { month: 'short' });
        const year = date.getFullYear();
        
        return `${day} ${month} ${year}`;
    } catch (e) {
        console.error('Date format error:', dateStr, e);
        return '—';
    }
}

// Pagination function
function goToPage(page) {
    dashboardState.currentPage = page;
    loadDashboardPage(page);
}

// Tab switching
function switchTab(tabId) {
    const panelOverview = document.getElementById('panel-overview');
    const panelHistory = document.getElementById('panel-history');

    if (tabId === 'overview') {
        panelOverview.style.display = 'block';
        panelHistory.style.display = 'none';
        window.history.replaceState({}, '', '/dashboard/');
    } else if (tabId === 'history') {
        panelOverview.style.display = 'none';
        panelHistory.style.display = 'block';
        window.history.replaceState({}, '', '/employee_dashboard/');
    }
}

// Initialize on page load
$(function() {
    const path = window.location.pathname;

    if (path.includes('employee_dashboard')) {
        switchTab('history');
    } else {
        switchTab('overview');
    }

    loadDashboard();

    if (!employeeAutoRefreshTimer) {
        employeeAutoRefreshTimer = setInterval(() => {
            if (document.visibilityState === 'visible') {
                loadDashboard();
            }
        }, 30000);
    }
});

window.addEventListener('beforeunload', () => {
    if (employeeAutoRefreshTimer) {
        clearInterval(employeeAutoRefreshTimer);
        employeeAutoRefreshTimer = null;
    }
});
</script>
