{% extends "base.html" %}
{% block title %}Notifications — LeaveSetu{% endblock %}
{% block page_title %}Notifications{% endblock %}

{% block extra_head %}
<style>
  .notif-container { max-width: 800px; margin: 0 auto; }
  .notif-list { display: flex; flex-direction: column; gap: 12px; }

  .notif-item {
    display: flex; align-items: flex-start; gap: 16px;
    padding: 18px 24px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    transition: all 0.2s ease;
    text-decoration: none; color: inherit; position: relative;
  }

  .notif-item.unread {
    background: rgba(0, 198, 212, 0.05);
    border-left: 4px solid var(--aqua);
  }

  .notif-icon-box {
    width: 42px; height: 42px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .notif-info { flex: 1; }
  .notif-msg { font-size: 14px; font-weight: 600; }
  .notif-time { font-size: 12px; color: gray; }

  .unread-indicator {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--aqua);
    position: absolute; top: 20px; right: 20px;
  }

  .empty-notif { text-align: center; padding: 60px; }
</style>
{% endblock %}

{% block content %}
<div class="notif-container">
  
  <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
    <h2>Notifications</h2>
    <div id="notif-count">0 Unread</div>
  </div>

  <div class="notif-list" id="notif-list">
    <!-- Dynamic content will come here -->
  </div>

  <div class="empty-notif" id="empty-box" style="display:none;">
    <h3>All caught up!</h3>
    <p>No notifications found</p>
  </div>

</div>

<script>
async function loadNotifications() {
    try {
        const response = await fetch("/api/notifications/", {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
                "X-Requested-With": "XMLHttpRequest"
            },
            credentials: "same-origin"
        });

        const data = await response.json();
        console.log("API DATA:", data);

        const notifications = data.results || data.data || [];
        const unreadCount = Number(data.unread_count) || 0;

        document.getElementById("notif-count").innerText =
          unreadCount + " Unread";

        if (typeof updateGlobalNotificationBadges === "function") {
          updateGlobalNotificationBadges(unreadCount);
        }

        renderNotifications(notifications);

    } catch (error) {
        console.error("Error:", error);
    }
}

function renderNotifications(notifications) {
    const container = document.getElementById("notif-list");
    const emptyBox = document.getElementById("empty-box");

    container.innerHTML = "";

    if (!notifications.length) {
        emptyBox.style.display = "block";
        return;
    }

    emptyBox.style.display = "none";

    notifications.forEach(n => {

        const item = document.createElement(n.link ? "a" : "div");

        item.className = "notif-item " + (!n.read_status ? "unread" : "");

        if (n.link) {
            item.href = n.link;
        }

        const iconClass = getIconClass(n.message);

        item.innerHTML = `
            <div class="notif-icon-box ${iconClass}">
                ${getIcon(n.message)}
            </div>

            <div class="notif-info">
                <div class="notif-msg">${n.message}</div>
                <div class="notif-time">${timeAgo(n.created_at)}</div>
            </div>

            ${!n.read_status ? '<div class="unread-indicator"></div>' : ''}
        `;

        container.appendChild(item);
    });
}

function getIconClass(message) {
    message = message.toUpperCase();

    if (message.includes("APPROVED")) return "notif-icon-success";
    if (message.includes("REJECTED")) return "notif-icon-danger";
    if (message.includes("VOTE")) return "notif-icon-warning";

    return "notif-icon-default";
}

function getIcon(message) {
    message = message.toUpperCase();

    if (message.includes("APPROVED")) return '<i class="fa-solid fa-circle-check"></i>';
    if (message.includes("REJECTED")) return '<i class="fa-solid fa-circle-xmark"></i>';
    if (message.includes("VOTE")) return '<i class="fa-solid fa-inbox"></i>';

    return '<i class="fa-solid fa-bell"></i>';
}

function timeAgo(dateString) {
    const date = new Date(dateString);
    const seconds = Math.floor((new Date() - date) / 1000);

    if (seconds < 60) return "just now";
    if (seconds < 3600) return Math.floor(seconds / 60) + " min ago";
    if (seconds < 86400) return Math.floor(seconds / 3600) + " hrs ago";

    return Math.floor(seconds / 86400) + " days ago";
}

// Load on page open
document.addEventListener("DOMContentLoaded", loadNotifications);

// Optional auto refresh
setInterval(loadNotifications, 30000);
</script>

{% endblock %}
